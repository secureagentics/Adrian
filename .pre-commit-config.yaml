# Adrian pre-commit hooks. Run on every `git commit` once `pre-commit
# install` has been run from this repo's root (see CONTRIBUTING.md).
# Formatting/lint hooks are scoped to Python files under `sdk/python/`
# and `scripts/`; the licence-header hook covers Go, Python, TypeScript,
# JavaScript, proto and shell sources repo-wide.

default_install_hook_types: [pre-commit]
default_language_version:
  python: python3.12

# Vendored third-party deps (protobuf/websockets/certifi bundled into the
# Claude Code plugin) are committed verbatim; keep every hook off them so no
# dev needs to remember --no-verify.
exclude: '^integrations/claude-code/vendor/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
        files: ^(sdk/python|scripts)/.*\.py$
      - id: ruff-check
        files: ^(sdk/python|scripts)/.*\.py$
        args: [--fix]

  - repo: local
    hooks:
      - id: license-header
        name: licence header
        entry: python3 scripts/add_license_header.py
        language: system
        files: \.(go|py|pyi|ts|tsx|js|mjs|cjs|proto|sh)$
        # Vendored code keeps its own licence; generated proto bindings
        # would lose the header on regeneration.
        exclude: (^|/)vendor/|(^|/)node_modules/|\.pb\.go$|_pb2(_grpc)?\.pyi?$
      - id: basedpyright
        name: basedpyright
        entry: basedpyright
        language: system
        types: [python]
        files: ^sdk/python/adrian/.*\.py$
        pass_filenames: false
        args: [-p, sdk/python, sdk/python/adrian]
